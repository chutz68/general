name: Deploy Solar Jobs to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  PROJECT_ID: modern-cubist-412113
  REGION: europe-west6
  REPO: solar
  JOB_INGEST: solar-5min-job
  JOB_DAILY: solar-daily-job

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ---------------------------------------------------------
      # ingest_5m job
      # ---------------------------------------------------------
      - name: Build & Push ingest_5m image
        working-directory: solarmanager/ingest_5m
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ingest-5m"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE" --all-tags

      - name: Deploy ingest_5m Cloud Run Job
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ingest-5m:${{ github.sha }}"
          gcloud run jobs deploy ${{ env.JOB_INGEST }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --task-timeout=600 \
            --max-retries=0 \
            --service-account=solar-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }},SECRET_SM_TOKEN=solarmanager-token,SECRET_OWM_APIKEY=openweathermap-apikey" \
            --project=${{ env.PROJECT_ID }}

      # ---------------------------------------------------------
      # aggregate_1d job
      # ---------------------------------------------------------
      - name: Build & Push aggregate_1d image
        working-directory: solarmanager/aggregate_1d
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/aggregate-1d"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE" --all-tags

      - name: Deploy aggregate_1d Cloud Run Job
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/aggregate-1d:${{ github.sha }}"
          gcloud run jobs deploy ${{ env.JOB_DAILY }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --task-timeout=300 \
            --max-retries=0 \
            --service-account=solar-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --project=${{ env.PROJECT_ID }}
