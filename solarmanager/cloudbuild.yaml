steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "europe-west6-docker.pkg.dev/$PROJECT_ID/solar/solar-job:$SHORT_SHA"
      - -t
      - "europe-west6-docker.pkg.dev/$PROJECT_ID/solar/solar-job:latest"
      - .

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "europe-west6-docker.pkg.dev/$PROJECT_ID/solar/solar-job"

  # Deploy / update Cloud Run Job
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - solar-bq-job
      - --image=europe-west6-docker.pkg.dev/$PROJECT_ID/solar/solar-job:$SHORT_SHA
      - --region=europe-west6
      - --task-timeout=600          # 10 min max (6 retries × 30s + buffer)
      - --max-retries=0             # Cloud Scheduler handles scheduling; no Cloud Run retries
      - --service-account=solar-runner@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID
      - --set-secrets=SECRET_SM_TOKEN=solarmanager-token:latest,SECRET_OWM_APIKEY=openweathermap-apikey:latest

images:
  - "europe-west6-docker.pkg.dev/$PROJECT_ID/solar/solar-job"
