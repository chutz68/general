# docker-compose.yml — Deploy on Synology DS218+ via Container Manager
#
# Place this file at /volume1/docker/solar-dashboard/docker-compose.yml
#
# One-time prep on the Synology:
#   mkdir -p /volume1/docker/solar-dashboard/secrets
#   # copy GCP service account JSON to /volume1/docker/solar-dashboard/secrets/gcp-key.json
#   chmod 600 /volume1/docker/solar-dashboard/secrets/gcp-key.json
#
# First run (also after pulling new image):
#   cd /volume1/docker/solar-dashboard
#   docker compose pull
#   docker compose up -d

services:
  solar-dashboard:
    image: ghcr.io/chutz68/solar-dashboard-vaadin:latest
    container_name: solar-dashboard
    restart: unless-stopped
    ports:
      # Reverse Proxy in DSM forwards solar.softhenge.ch:443 -> localhost:8080
      - "8080:8080"
    environment:
      TZ: Europe/Zurich
      SPRING_PROFILES_ACTIVE: production
      GOOGLE_APPLICATION_CREDENTIALS: /etc/gcp/key.json
      # Adjust JVM heap if your DS218+ runs other heavy services (default ~75% of cgroup mem)
      JAVA_OPTS: "-XX:MaxRAMPercentage=60 -XX:+UseG1GC"
    volumes:
      - ./secrets/gcp-key.json:/etc/gcp/key.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
